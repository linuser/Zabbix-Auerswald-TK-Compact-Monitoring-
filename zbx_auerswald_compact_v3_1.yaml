    priority: WARNING
    manual_close: 'YES'
    status: DISABLED
    tags:
    - tag: scope
      value: notice
    - tag: component
      value: syslog
  - uuid: bdeaeadb27eb475282d89d94632c5329
    expression: logseverity(/Auerswald COMpact 5000 by HTTP/log[{$AUERSWALD.SYSLOG.PATH},"(reboot|restart|startup|boot)",,,skip,\0])>=0 and length(last(/Auerswald COMpact 5000 by HTTP/log[{$AUERSWALD.SYSLOG.PATH},"(reboot|restart|startup|boot)",,,skip,\0]))>0
    name: 'Auerswald Syslog: Neustart erkannt'
    priority: WARNING
    manual_close: 'YES'
    status: DISABLED
    tags:
    - tag: scope
      value: availability
    - tag: component
      value: system
