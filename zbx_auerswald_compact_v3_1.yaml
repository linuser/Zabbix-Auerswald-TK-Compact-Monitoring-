    - tag: component
      value: channels
  - uuid: b48855e78aad4f8a80c1b63f6c297467
    expression: min(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.active,3m)>(last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.count)*0.8) and last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.count)>0
