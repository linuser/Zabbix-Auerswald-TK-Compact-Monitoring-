  - uuid: b0b5e2bc9b9f4399b5e6f0931d013cda
    expression: min(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.voip.active,3m)=last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.voip.count) and last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.voip.count)>0
