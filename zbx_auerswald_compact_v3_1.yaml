    description: Hohe Latenz zum SIP-Proxy kann Sprachqualitaet beeintraechtigen
    dependencies:
    - name: 'Auerswald: SIP-Proxy nicht erreichbar (Ping)'
      expression: max(/Auerswald COMpact 5000 by HTTP/icmpping[{$AUERSWALD.SIP.PROXY},,,],3m)=0
    tags:
    - tag: scope
      value: performance
    - tag: component
      value: sip-proxy
  - uuid: ba746230527749258b5cdc5c1db30786
    expression: min(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.active,3m)=last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.count) and last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.count)>0
