  - uuid: 2c427075b95b4b22970b976d555684b2
    expression: change(/Auerswald COMpact 5000 by HTTP/auerswald.exchanges.count)<>0 and last(/Auerswald COMpact 5000 by HTTP/auerswald.exchanges.count)>0 and min(/Auerswald COMpact 5000 by HTTP/auerswald.exchanges.count,15m)>0
    name: 'Auerswald: Amtsleitungen geaendert (jetzt {ITEM.VALUE})'
    priority: WARNING
    manual_close: 'YES'
    description: Feuert bei Aenderung der Amtsleitungen-Anzahl. min()>0 ueber 15 Min schuetzt gegen kurzzeitige 0-Flaps bei API-Fehlern.
