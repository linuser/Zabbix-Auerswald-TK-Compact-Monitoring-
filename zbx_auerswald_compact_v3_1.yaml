    - uuid: 7b7ceb536d8e432ab487d8295e30eb83
      name: 'System: Date Correct'
      type: DEPENDENT
      key: auerswald.system.date.ok
      delay: '0'
      history: 7d
      value_type: UNSIGNED
      master_item:
        key: auerswald.system.raw
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.date
      - type: JAVASCRIPT
        parameters:
        - 'try {  var pbxDate = value.trim();  var parts = pbxDate.split(".");  if(parts.length !== 3) return 0;  var pbxTime = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));  var
          now = new Date();  var diffMs = Math.abs(now.getTime() - pbxTime.getTime());  var diffDays = diffMs / 86400000;  return (diffDays <= 1) ? 1 : 0;} catch(e) { return 0; }'
      description: 1 = Anlagen-Datum stimmt mit Server-Datum ueberein, 0 = Datum falsch oder nicht lesbar. Matcht auch wenn die API zusaetzlich eine Uhrzeit mitliefert.
      tags:
      - tag: component
        value: system
