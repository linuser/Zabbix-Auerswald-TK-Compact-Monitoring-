zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: 57ba5ced733e4c22b5a8cf4ff49f1788
    name: Templates/Telephony
  templates:
  - uuid: 746c0321d41346a3acb9d099c7dacf28
    template: Auerswald COMpact 5000 by HTTP
    name: Auerswald COMpact 5000 by HTTP
    description: 'Monitoring fuer Auerswald COMpact 4000/5000/5200/5500R und COMmander 6000 via HTTP API (Digest Auth).


      Autor: Alexander Fox | PlaNet Fox

      Version: 3.1

      Datum: 2026-04-23


      Bugfixes v3.1:

      - JSONPath Typ-Konsistenz: ext_ports_status liefert STRINGS (anschlArt="2", bKanalStatus="0" etc.) - Filter jetzt durchgaengig mit String-Vergleich, auch fuer VoIP/ISDN-Subcounts (diese waren vorher
      mit Integer-Vergleich buggy)

      - VM-Speicher Trigger-Dependency korrigiert (WARNING haengt von KRITISCH ab)

      - API Auth/Lock Trigger Dependency ergaenzt

      - change()-Trigger gegen API-Aussetzer abgesichert (DISCARD_VALUE statt "")

      - system.date.ok robuster (Timezone/Zeitformat-sicher)

      - Firmware-URL als Macro, Regex erweitert fuer 3-stellige Versionen

      - MSN Array-Check, loose equality bei Typen-Vergleichen

      - value_type explizit gesetzt

      - Ping-Dependency fuer Latenz-Trigger'
    macros:
    - macro: '{$AUERSWALD.IP}'
      value: 192.168.1.240
      description: IP-Adresse der Auerswald Anlage
    - macro: '{$AUERSWALD.PORT}'
      value: '443'
      description: 'HTTPS-Port (Standard: 443)'
    - macro: '{$AUERSWALD.USER}'
      value: ''
      description: Sub-Admin Nummer (interne Rufnummer)
    - macro: '{$AUERSWALD.PASSWORD}'
      value: ''
      type: SECRET_TEXT
      description: Web-/API-Passwort
    - macro: '{$AUERSWALD.VMF_STORAGE.WARN}'
      value: '80'
    - macro: '{$AUERSWALD.VMF_STORAGE.CRIT}'
      value: '95'
    - macro: '{$AUERSWALD.PING.WARN}'
      value: '0.1'
    - macro: '{$AUERSWALD.SIP.PROXY}'
      value: ''
      description: SIP-Proxy Hostname (z.B. s<Seriennr>.pbx.auerproxy.de) - pro Anlage setzen!
    - macro: '{$AUERSWALD.SIP.PORT}'
      value: '5060'
      description: SIP Port (5060=SIP, 5061=SIPS)
    - macro: '{$AUERSWALD.SYSLOG.PATH}'
      value: /var/log/auerswald.log
      description: Pfad zur Auerswald Syslog-Datei auf dem Zabbix Proxy/Server
    - macro: '{$AUERSWALD.FIRMWARE.URL}'
      value: https://www.auerswald.de/de/support/produkt/compact-4000/support
      description: 'URL der Auerswald-Support-Seite fuer Firmware-Check. Pro Modell anpassen! Beispiele: compact-4000, compact-5000, compact-5200, compact-5500r, commander-6000'
