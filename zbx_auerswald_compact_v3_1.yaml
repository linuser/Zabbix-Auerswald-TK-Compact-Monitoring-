      expression: max(/Auerswald COMpact 5000 by HTTP/icmpping[{$AUERSWALD.SIP.PROXY},,,],3m)=0
    tags:
    - tag: scope
      value: availability
    - tag: component
      value: sip-proxy
  - uuid: b2fe28fa4fdc46ad9712dc2a1c5f9b34
    expression: last(/Auerswald COMpact 5000 by HTTP/icmppingsec[{$AUERSWALD.SIP.PROXY},,,])>0.1
    name: 'Auerswald: SIP-Proxy hohe Latenz ({ITEM.VALUE}s)'
