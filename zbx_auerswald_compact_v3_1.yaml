    name: 'Auerswald: API Account GESPERRT (noch {ITEM.VALUE}s)'
    priority: DISASTER
    description: Anlage hat API-Zugang gesperrt wegen zu vieler fehlgeschlagener Logins. Warten oder Anlage neustarten.
