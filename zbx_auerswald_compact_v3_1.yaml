    expression: logseverity(/Auerswald COMpact 5000 by HTTP/log[{$AUERSWALD.SYSLOG.PATH},"(auth.*fail|401.*Unauthorized|registration.*failed|SIP.*403)",,,skip,\0])>=0 and length(last(/Auerswald COMpact
      5000 by HTTP/log[{$AUERSWALD.SYSLOG.PATH},"(auth.*fail|401.*Unauthorized|registration.*failed|SIP.*403)",,,skip,\0]))>0
