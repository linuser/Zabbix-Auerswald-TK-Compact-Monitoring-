    dependencies:
    - name: 'Auerswald: SIP-Proxy DNS Aufloesung fehlgeschlagen'
      expression: max(/Auerswald COMpact 5000 by HTTP/net.dns[,{$AUERSWALD.SIP.PROXY},,,2],5m)=0
    tags:
    - tag: scope
      value: availability
    - tag: component
      value: sip-proxy
  - uuid: 7b503935bd3d45f9875eee3dd882c288
    expression: max(/Auerswald COMpact 5000 by HTTP/net.tcp.service[tcp,{$AUERSWALD.SIP.PROXY},{$AUERSWALD.SIP.PORT}],3m)=0 and max(/Auerswald COMpact 5000 by HTTP/net.tcp.service[tcp,{$AUERSWALD.SIP.PROXY},5061],3m)=0
    name: 'Auerswald: SIP-Proxy Ports nicht erreichbar (5060+5061)'
    priority: HIGH
    dependencies:
