      - type: JAVASCRIPT
        parameters:
        - try { var d = JSON.parse(value); if (!Array.isArray(d)) return 0; var c = 0; for(var i=0;i<d.length;i++){ if(Number(d[i].awssoforttyp) !== 0 || Number(d[i].awsnrtyp) !== 0 || Number(d[i].awsbstyp)
          !== 0) c++; } return c; } catch(e) { return 0; }
      tags:
      - tag: component
        value: msn
