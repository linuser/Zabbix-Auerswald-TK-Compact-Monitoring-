    - tag: component
      value: firmware
  - uuid: a4e0d7cfafcf4010bd6ab3d577e214db
    expression: min(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.voip.blocked,3m)=last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.voip.count) and last(/Auerswald COMpact 5000 by HTTP/auerswald.ext.ports.voip.count)>0
