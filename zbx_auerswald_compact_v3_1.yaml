    - name: 'Auerswald: Nicht erreichbar (Ping)'
      expression: max(/Auerswald COMpact 5000 by HTTP/icmpping[,,,,],3m)=0
    tags:
    - tag: scope
      value: security
    - tag: component
      value: api
