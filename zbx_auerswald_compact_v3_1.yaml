        value: msn
    - uuid: d92b7701debd4be8860d59f8bcc5fe3d
      name: 'MSN/DDI: Anzahl unique Rufnummern'
      type: DEPENDENT
      key: auerswald.msn.count.unique
      delay: '0'
      value_type: UNSIGNED
      description: Anzahl eindeutiger Rufnummern (ohne Duplikate ueber mehrere Aemter)
      master_item:
        key: auerswald.msn.forwarding.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - try { var d = JSON.parse(value); if (!Array.isArray(d)) return 0; var seen = {}; var c = 0; for(var i=0;i<d.length;i++){ if(!seen[d[i].rufNummer]){ seen[d[i].rufNummer]=true; c++; } } return c;
          } catch(e) { return 0; }
      tags:
      - tag: component
        value: msn
    - uuid: e35ca5e2ecea4f29a99fbf4dbf53e2fd
      name: 'MSN/DDI: Rufnummern-Liste'
      type: DEPENDENT
      key: auerswald.msn.list
      delay: '0'
      history: 30d
      value_type: TEXT
      description: Liste aller konfigurierten Rufnummern mit Bezeichnung (unique nach Rufnummer)
      master_item:
        key: auerswald.msn.forwarding.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - try { var d = JSON.parse(value); if (!Array.isArray(d)) return ""; var seen = {}; var result = []; for(var i=0;i<d.length;i++){ if(!seen[d[i].rufNummer]){ seen[d[i].rufNummer]=true; result.push(d[i].rufNummer
          + " = " + d[i].name); } } result.sort(); return result.join("\n"); } catch(e) { return ""; }
      tags:
      - tag: component
        value: msn
    - uuid: 045e178bef5545f8920971ff48d2be88
      name: 'MSN/DDI: Aktive Umleitungen'
      type: DEPENDENT
      key: auerswald.msn.aws.active
      delay: '0'
      history: 30d
      value_type: TEXT
      description: Rufnummern mit aktiver Anrufweiterschaltung (Sofort, Nichtmelden oder Besetzt)
      master_item:
        key: auerswald.msn.forwarding.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'try { var d = JSON.parse(value); if (!Array.isArray(d)) return "Keine"; var result = []; for(var i=0;i<d.length;i++){ var aws = []; if(Number(d[i].awssoforttyp) !== 0) aws.push("Sofort->" + d[i].awssofortziel);
          if(Number(d[i].awsnrtyp) !== 0) aws.push("NR->" + d[i].awsnrziel); if(Number(d[i].awsbstyp) !== 0) aws.push("Besetzt->" + d[i].awsbsziel); if(aws.length > 0){ result.push(d[i].rufNummer + " ("
          + d[i].name + "): " + aws.join(", ")); } } return result.length > 0 ? result.join("\n") : "Keine"; } catch(e) { return ""; }'
      tags:
      - tag: component
        value: msn
    - uuid: ff72c33164eb495fb4edd289993837f1
      name: 'MSN/DDI: Anzahl aktive Umleitungen'
      type: DEPENDENT
      key: auerswald.msn.aws.count
