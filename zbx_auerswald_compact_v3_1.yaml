    tags:
    - tag: scope
      value: security
    - tag: component
      value: syslog
  - uuid: ae2d68c3a78c45ebb4c95c06402c2e29
    expression: logseverity(/Auerswald COMpact 5000 by HTTP/log[{$AUERSWALD.SYSLOG.PATH},"(error|critical|emergency|alert)",,,skip,\0])>=0 and length(last(/Auerswald COMpact 5000 by HTTP/log[{$AUERSWALD.SYSLOG.PATH},"(error|critical|emergency|alert)",,,skip,\0]))>0
